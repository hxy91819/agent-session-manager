name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Provider performance contract
        if: matrix.os == 'ubuntu-latest'
        # Hosted macOS and Windows runners are noisier; keep portability checks
        # everywhere, but gate provider latency on the most stable runner.
        run: go run ./tools/check-provider-performance

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/asm
